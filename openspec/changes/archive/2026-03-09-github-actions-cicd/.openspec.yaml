name: github-actions-cicd
description: 配置 GitHub Actions CI/CD 流水线，实现自动构建、测试和部署，同时进行性能优化
status: proposal
artifacts:
  - id: proposal
    type: proposal
    status: done
    path: proposal.md
  - id: design
    type: design
    status: done
    path: design.md
  - id: tasks
    type: tasks
    status: done
    path: tasks.md

apply:
  requires:
    - tasks
